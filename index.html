<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1 Year in 2 Hours</title>
    <style>
        /* 全体のテーマ：昔の映画館 */
        body {
            font-family: 'Times New Roman', serif;
            background-color: #111;
            color: #f4ebd0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            overscroll-behavior-y: none;
        }

        #app {
            width: 100%;
            max-width: 400px;
            height: 100dvh;
            position: relative;
            background-color: #1a1a1a;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 共通ボタン */
        .back-btn {
            background: none;
            border: none;
            color: #f4ebd0;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            padding: 0;
            letter-spacing: 1px;
            width: 60px;
            text-align: left;
        }
        .header-spacer { width: 60px; }

        /* --- 1. 月選択画面（立体スクロール） --- */
        #month-screen {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .month-screen-header {
            text-align: center;
            padding: 30px 0 10px 0;
            font-size: 18px;
            letter-spacing: 4px;
            z-index: 20;
        }

        #month-list {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .month-card {
            position: absolute;
            left: 0; right: 0; top: 0; bottom: 0;
            margin: auto;
            width: 85%;
            height: auto;
            aspect-ratio: 16 / 9;
            background-color: #222;
            border: 2px solid #444;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            cursor: pointer;
            
            opacity: 0;
            transform: translateY(0);
            pointer-events: none;
            z-index: 0;
        }

        .month-card.active {
            transform: translateY(0);
            opacity: 1;
            z-index: 10;
            border-color: #f4ebd0;
            pointer-events: auto;
            filter: blur(0px) brightness(1);
        }

        .month-card.prev {
            transform: translateY(-60%);
            opacity: 0.85;
            z-index: 5;
            pointer-events: auto;
            filter: blur(1px) brightness(0.75);
        }

        .month-card.next {
            transform: translateY(60%);
            opacity: 0.85;
            z-index: 5;
            pointer-events: auto;
            filter: blur(1px) brightness(0.75);
        }

        .month-card.hidden-prev {
            transform: translateY(-120%);
            opacity: 0;
        }
        .month-card.hidden-next {
            transform: translateY(120%);
            opacity: 0;
        }

        .month-name {
            font-size: 32px;
            letter-spacing: 3px;
            z-index: 2;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
        }

        .month-card.has-data::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, #4a3f35, #2a221d);
            opacity: 0.7;
            z-index: 1;
        }

        /* --- 2. ホーム画面（現実の暦カレンダー） --- */
        #home-screen {
            display: none; 
            flex-direction: column;
            height: 100dvh;
        }

        .home-header {
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        h2.screen-title {
            margin: 0;
            flex-grow: 1;
            text-align: center;
            font-size: 20px;
            letter-spacing: 2px;
            font-weight: normal;
        }

        #calendar-container {
            padding: 20px;
            overflow-y: auto;
            flex-grow: 1;
            overscroll-behavior-y: auto;
        }

        .weekday-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        #calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 30px;
        }

        .day-box {
            aspect-ratio: 1;
            background-color: #2a2a2a;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #888;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* ★前後の月の日付のデザイン */
        .day-box.out-of-month {
            opacity: 0.4;
            background-color: #151515;
            border-color: #222;
        }

        .day-box.today {
            border: 2px solid #b22222;
            color: #f4ebd0;
            box-shadow: inset 0 0 15px rgba(178, 34, 34, 0.2);
            opacity: 1; /* out-of-monthでも今日はハッキリさせる */
        }

        .day-box.recorded {
            background-color: #4a3f35;
            color: #f4ebd0;
            border-color: #665;
            opacity: 1; /* 録画済みならハッキリ表示 */
        }
        
        .day-box.recorded::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
        }

        .day-box span {
            position: relative;
            z-index: 1;
        }

        #tickets-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 30px;
        }

        .ticket {
            background-color: #f4ebd0;
            color: #111;
            border: 2px dashed #111;
            border-radius: 8px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .ticket::before, .ticket::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 16px;
            height: 16px;
            background-color: #1a1a1a;
            border-radius: 50%;
            transform: translateY(-50%);
        }
        .ticket::before { left: -8px; }
        .ticket::after { right: -8px; }

        .ticket:hover {
            transform: translateY(-2px);
            background-color: #e8debf;
        }

        .ticket-info {
            display: flex;
            flex-direction: column;
        }

        .ticket-week {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .ticket-dates {
            font-size: 11px;
            color: #444;
            margin-top: 4px;
        }

        .ticket-play {
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* チケットに録画日数を表示するバッジ */
        .record-badge {
            font-size: 10px;
            background: #b22222;
            color: #fff;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }

        /* --- 3. 撮影画面 --- */
        #camera-screen {
            display: none;
            flex-direction: column;
            height: 100dvh;
            background-color: #000;
        }

        .camera-header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        #camera-date-display {
            flex-grow: 1;
            text-align: center;
            font-size: 16px;
            letter-spacing: 2px;
            color: #888;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #222;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-top: 20px;
        }

        #camera-view {
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #record-timer {
            position: absolute;
            top: 10px;
            right: 15px;
            color: #b22222;
            font-family: monospace;
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 4px;
        }

        #progress-container {
            width: 100%;
            height: 6px;
            background-color: #111;
            position: absolute;
            bottom: 0;
            left: 0;
            z-index: 10;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background-color: #b22222;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(178, 34, 34, 0.8);
        }

        .controls {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #record-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: #b22222;
            border: 4px solid #f4ebd0;
            cursor: pointer;
            outline: none;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        #record-btn.recording {
            border-radius: 10px;
            transform: scale(0.9);
        }

        #record-btn:disabled {
            background-color: #555;
            border-color: #777;
            cursor: not-allowed;
        }
        
        .mock-text { position: absolute; color: #555; font-size: 12px; letter-spacing: 1px; z-index: 0; }

        /* --- 4. 撮影終了画面（CUT画面） --- */
        #finish-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            background-color: #0a0a0a;
            position: absolute;
            top: 0; left: 0; width: 100%;
            z-index: 100;
        }

        .finish-title {
            font-size: 32px;
            letter-spacing: 8px;
            color: #f4ebd0;
            margin-bottom: 20px;
            font-style: italic;
        }

        .finish-desc {
            font-size: 12px;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 50px;
            text-align: center;
        }

        .finish-btn {
            background-color: transparent;
            border: 1px solid #b22222;
            color: #b22222;
            padding: 15px 40px;
            font-family: inherit;
            font-size: 14px;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .finish-btn:hover {
            background-color: #b22222;
            color: #111;
        }

        /* --- 5. 再生画面 --- */
        #playback-screen {
            display: none;
            flex-direction: column;
            height: 100dvh;
            background-color: #000;
        }

        #playback-date-display {
            flex-grow: 1;
            text-align: center;
            font-size: 16px;
            letter-spacing: 2px;
            color: #888;
        }

        #playback-view {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

    </style>
</head>
<body>

    <div id="app">
        <div id="month-screen">
            <div class="month-screen-header">YEAR <span id="current-year-display"></span></div>
            <div id="month-list"></div>
        </div>

        <div id="home-screen">
            <header class="home-header">
                <button class="back-btn" id="month-back-btn">&lt; BACK</button>
                <h2 class="screen-title" id="month-title">June</h2>
                <div class="header-spacer"></div>
            </header>

            <div id="calendar-container">
                <div class="weekday-header">
                    <span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
                </div>
                <div id="calendar"></div>
                <div id="tickets-area"></div>
            </div>
        </div>

        <div id="camera-screen">
            <header class="camera-header">
                <button class="back-btn" id="camera-back-btn">&lt; BACK</button>
                <div id="camera-date-display">REC</div>
                <div class="header-spacer"></div>
            </header>
            
            <div class="video-container">
                <video id="camera-view" autoplay muted playsinline></video>
                <div class="mock-text">CAMERA SETUP...</div>
                <div id="record-timer">00:00 / 00:20</div>
                <div id="progress-container">
                    <div id="progress-bar"></div>
                </div>
            </div>

            <div class="controls">
                <button id="record-btn"></button>
            </div>
        </div>

        <div id="finish-screen">
            <div class="finish-title">CUT.</div>
            <div class="finish-desc">今日の記録をフィルムに焼き付けました</div>
            <button class="finish-btn" id="finish-ok-btn">RETURN</button>
        </div>

        <div id="playback-screen">
            <header class="camera-header">
                <button class="back-btn" id="playback-back-btn">&lt; BACK</button>
                <div id="playback-date-display">PLAY</div>
                <div class="header-spacer"></div>
            </header>
            
            <div class="video-container">
                <video id="playback-view" controls playsinline></video>
            </div>
        </div>
    </div>

    <script>
        /* === エンジニア側の処理 === */

        const monthScreen = document.getElementById('month-screen');
        const monthList = document.getElementById('month-list');
        const homeScreen = document.getElementById('home-screen');
        const cameraScreen = document.getElementById('camera-screen');
        const finishScreen = document.getElementById('finish-screen');
        const playbackScreen = document.getElementById('playback-screen');
        
        const calendarElement = document.getElementById('calendar');
        const ticketsArea = document.getElementById('tickets-area');
        const monthTitle = document.getElementById('month-title');
        
        const cameraDateDisplay = document.getElementById('camera-date-display');
        const playbackDateDisplay = document.getElementById('playback-date-display');
        const cameraView = document.getElementById('camera-view');
        const playbackView = document.getElementById('playback-view');
        
        const recordBtn = document.getElementById('record-btn');
        const progressBar = document.getElementById('progress-bar');
        const recordTimer = document.getElementById('record-timer');

        // 今日の日付を取得
        const todayDateObj = new Date();
        const currentYearReal = todayDateObj.getFullYear();
        const currentMonthNumReal = todayDateObj.getMonth() + 1;
        const currentDateReal = todayDateObj.getDate();

        // 画面上部の年表示
        const viewYear = currentYearReal;
        document.getElementById('current-year-display').textContent = viewYear;
        
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        let activeMonthIndex = currentMonthNumReal - 1; 
        let cards = [];
        
        // 録画する際に「実際に押したマス目の日付」を保持する変数
        let recordTargetYear = null;
        let recordTargetMonth = null;
        let recordTargetDay = null;
        
        let selectedMonth = currentMonthNumReal;
        const recordedData = {};

        function initMonthScreen() {
            monthList.innerHTML = '';
            cards = [];

            for (let i = 0; i < 12; i++) {
                const card = document.createElement('div');
                card.className = 'month-card';
                
                const hasDataInMonth = Object.keys(recordedData).some(key => key.startsWith(`${viewYear}-${i + 1}-`));
                if (hasDataInMonth) card.classList.add('has-data');

                const nameSpan = document.createElement('div');
                nameSpan.className = 'month-name';
                nameSpan.textContent = monthNames[i];
                card.appendChild(nameSpan);

                card.onclick = () => {
                    if (i === activeMonthIndex) {
                        openMonth(i + 1);
                    } else if (i === activeMonthIndex - 1 || i === activeMonthIndex + 1) {
                        activeMonthIndex = i;
                        updateMonthCards();
                    }
                };

                monthList.appendChild(card);
                cards.push(card);
            }
            updateMonthCards();
        }

        function updateMonthCards() {
            cards.forEach((card, index) => {
                card.className = 'month-card'; 
                const hasDataInMonth = Object.keys(recordedData).some(key => key.startsWith(`${viewYear}-${index + 1}-`));
                if (hasDataInMonth) card.classList.add('has-data');

                if (index === activeMonthIndex) {
                    card.classList.add('active');
                } else if (index === activeMonthIndex - 1) {
                    card.classList.add('prev');
                } else if (index === activeMonthIndex + 1) {
                    card.classList.add('next');
                } else if (index < activeMonthIndex - 1) {
                    card.classList.add('hidden-prev');
                } else if (index > activeMonthIndex + 1) {
                    card.classList.add('hidden-next');
                }
            });
        }

        let isScrolling = false;
        let startY = 0;

        monthScreen.addEventListener('wheel', (e) => {
            if (isScrolling) return;
            if (e.deltaY > 20) {
                if (activeMonthIndex < 11) { activeMonthIndex++; updateMonthCards(); lockScroll(); }
            } else if (e.deltaY < -20) {
                if (activeMonthIndex > 0) { activeMonthIndex--; updateMonthCards(); lockScroll(); }
            }
        });

        monthScreen.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
        monthScreen.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; });
        monthScreen.addEventListener('touchend', (e) => {
            const endY = e.changedTouches[0].clientY;
            const delta = startY - endY;
            if (delta > 30) {
                if (activeMonthIndex < 11) { activeMonthIndex++; updateMonthCards(); }
            } else if (delta < -30) {
                if (activeMonthIndex > 0) { activeMonthIndex--; updateMonthCards(); }
            }
        });

        function lockScroll() {
            isScrolling = true;
            setTimeout(() => { isScrolling = false; }, 400); 
        }

        function openMonth(month) {
            selectedMonth = month;
            monthTitle.textContent = monthNames[month - 1];
            monthScreen.style.display = 'none';
            homeScreen.style.display = 'flex';
            renderCalendarAndTickets();
        }

        // ★大幅アップデート：月をまたぐカレンダーとチケットの描画
        function renderCalendarAndTickets() {
            calendarElement.innerHTML = '';
            ticketsArea.innerHTML = '';

            // 選択された月の初日と末日
            const firstDayOfMonth = new Date(viewYear, selectedMonth - 1, 1);
            const lastDayOfMonth = new Date(viewYear, selectedMonth, 0);

            // カレンダーの開始日（初日が属する週の日曜日）
            const startDate = new Date(firstDayOfMonth);
            startDate.setDate(startDate.getDate() - startDate.getDay());

            // カレンダーの終了日（末日が属する週の土曜日）
            const endDate = new Date(lastDayOfMonth);
            endDate.setDate(endDate.getDate() + (6 - endDate.getDay()));

            let currentDate = new Date(startDate);
            let weekDatesArray = [];
            let weekNum = 1;

            // 日曜日から土曜日まで、ループでカレンダーを生成
            while (currentDate <= endDate) {
                const boxYear = currentDate.getFullYear();
                const boxMonth = currentDate.getMonth() + 1;
                const boxDate = currentDate.getDate();
                const dataKey = `${boxYear}-${boxMonth}-${boxDate}`;

                const dayBox = document.createElement('div');
                dayBox.className = 'day-box';
                
                // 選択している月以外の日は色を暗くする
                if (boxMonth !== selectedMonth) {
                    dayBox.classList.add('out-of-month');
                }

                // 今日の判定
                const isToday = (boxYear === currentYearReal && boxMonth === currentMonthNumReal && boxDate === currentDateReal);
                if (isToday) dayBox.classList.add('today');
                if (recordedData[dataKey]) dayBox.classList.add('recorded');

                const dayText = document.createElement('span');
                dayText.textContent = boxDate;
                dayBox.appendChild(dayText);
                
                // クリック時の処理（正確な年月日を渡す）
                dayBox.onclick = () => {
                    if (recordedData[dataKey]) {
                        openPlaybackScreen(boxYear, boxMonth, boxDate, recordedData[dataKey]);
                        return;
                    }
                    if (isToday) {
                        openCameraScreen(boxYear, boxMonth, boxDate);
                    } else {
                        // 今日リセット用オブジェクト
                        const todayResetObj = new Date(currentYearReal, currentMonthNumReal - 1, currentDateReal);
                        if (currentDate > todayResetObj) {
                            alert('まだその日は来ていません。未来の記録を楽しみにお待ちください。');
                        } else {
                            alert('過去の日は撮影できません。日々の記録は当日のみ可能です。');
                        }
                    }
                };
                
                calendarElement.appendChild(dayBox);
                
                // 1週間分の配列に日付を保存
                weekDatesArray.push(new Date(currentDate));

                // 土曜日（週の終わり）が来たらチケットを生成
                if (currentDate.getDay() === 6) {
                    createTicket(weekNum, weekDatesArray);
                    weekNum++;
                    weekDatesArray = []; // 次の週のために配列をリセット
                }

                // 翌日へ進む
                currentDate.setDate(currentDate.getDate() + 1);
            }
        }

        // 月をまたぐ表示に対応したチケット生成
        function createTicket(weekNum, datesInWeek) {
            const startDay = datesInWeek[0];
            const endDay = datesInWeek[6];

            const startM = monthNames[startDay.getMonth()].substring(0, 3);
            const endM = monthNames[endDay.getMonth()].substring(0, 3);

            let dateLabel = '';
            // 月をまたいでいるかどうかで表示を分ける
            if (startDay.getMonth() === endDay.getMonth()) {
                dateLabel = `${startM} ${startDay.getDate()} - ${endDay.getDate()}`;
            } else {
                dateLabel = `${startM} ${startDay.getDate()} - ${endM} ${endDay.getDate()}`;
            }

            // この週にいくつの動画が記録されているかカウント
            let recordedCount = 0;
            datesInWeek.forEach(d => {
                const key = `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
                if (recordedData[key]) recordedCount++;
            });

            const ticket = document.createElement('div');
            ticket.className = 'ticket';
            ticket.innerHTML = `
                <div class="ticket-info">
                    <div class="ticket-week">WEEK ${weekNum}</div>
                    <div class="ticket-dates">${dateLabel}</div>
                </div>
                <div class="ticket-play">
                    ${recordedCount > 0 ? `<span class="record-badge">${recordedCount} REC</span>` : ''}
                    ▶
                </div>
            `;
            
            ticket.onclick = () => {
                if (recordedCount === 0) {
                    alert('この週にはまだ記録がありません。');
                } else {
                    alert(`【${dateLabel}】\nこの週に記録された ${recordedCount} 日分の映像を、1本の映画としてつなげて再生する処理に入ります。（※今後の実装）`);
                }
            };
            ticketsArea.appendChild(ticket);
        }

        /* === 録画システムの構築 === */
        let isRecording = false;
        let totalRecordTime = 0;
        let timerInterval;
        let mediaRecorder;
        let recordedChunks = [];
        const MAX_RECORD_TIME = 20000;

        function openCameraScreen(y, m, d) {
            recordTargetYear = y;
            recordTargetMonth = m;
            recordTargetDay = d;
            
            cameraDateDisplay.textContent = `${monthNames[m-1].substring(0,3)} ${d} - REC`;
            homeScreen.style.display = 'none';
            cameraScreen.style.display = 'flex';
            
            totalRecordTime = 0;
            recordedChunks = [];
            progressBar.style.width = '0%';
            recordTimer.textContent = '00:00 / 00:20';
            
            recordBtn.disabled = false;
            recordBtn.classList.remove('recording');

            startCamera();
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { aspectRatio: 16/9, facingMode: "environment" },
                    audio: true
                });
                cameraView.srcObject = stream;
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = function(event) {
                    if (event.data.size > 0) recordedChunks.push(event.data);
                };

                mediaRecorder.onstop = function() {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' }); 
                    const videoURL = URL.createObjectURL(blob); 
                    
                    // 正しい年月日でデータを保存
                    const dataKey = `${recordTargetYear}-${recordTargetMonth}-${recordTargetDay}`;
                    recordedData[dataKey] = videoURL;
                    
                    stopCamera();
                    cameraScreen.style.display = 'none';
                    finishScreen.style.display = 'flex';
                };
            } catch (err) {
                console.log("カメラ起動エラー:", err);
                alert("カメラまたはマイクの起動に失敗しました。\nブラウザのアクセス許可をご確認ください。");
            }
        }

        function stopCamera() {
            if (cameraView.srcObject) {
                cameraView.srcObject.getTracks().forEach(t => t.stop());
            }
        }

        recordBtn.onclick = function() {
            if (!mediaRecorder) return;

            if (isRecording) {
                isRecording = false;
                recordBtn.classList.remove('recording');
                clearInterval(timerInterval);
                if (mediaRecorder.state === 'recording') mediaRecorder.pause(); 
            } else {
                isRecording = true;
                recordBtn.classList.add('recording');
                if (mediaRecorder.state === 'inactive') mediaRecorder.start(); 
                else if (mediaRecorder.state === 'paused') mediaRecorder.resume(); 

                timerInterval = setInterval(() => {
                    totalRecordTime += 100;
                    progressBar.style.width = (totalRecordTime / MAX_RECORD_TIME) * 100 + '%';
                    
                    const currentSec = Math.floor(totalRecordTime / 1000);
                    const formattedSec = currentSec.toString().padStart(2, '0');
                    recordTimer.textContent = `00:${formattedSec} / 00:20`;
                    
                    if (totalRecordTime >= MAX_RECORD_TIME) {
                        finishRecording();
                    }
                }, 100);
            }
        };

        function finishRecording() {
            isRecording = false;
            recordBtn.classList.remove('recording');
            clearInterval(timerInterval);
            recordBtn.disabled = true;
            if (mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        }

        // CUT画面のRETURNボタン
        document.getElementById('finish-ok-btn').onclick = () => {
            finishScreen.style.display = 'none';
            homeScreen.style.display = 'flex';
            renderCalendarAndTickets(); 
            initMonthScreen();
        };

        // --- 再生画面の処理 ---
        function openPlaybackScreen(y, m, d, videoURL) {
            playbackDateDisplay.textContent = `${monthNames[m-1].substring(0,3)} ${d} - PLAY`;
            playbackView.src = videoURL; 
            
            homeScreen.style.display = 'none';
            playbackScreen.style.display = 'flex';
            playbackView.play(); 
        }

        document.getElementById('playback-back-btn').onclick = () => {
            playbackView.pause();
            playbackView.src = ""; 
            playbackScreen.style.display = 'none';
            homeScreen.style.display = 'flex';
        };

        // --- ナビゲーション処理 ---
        document.getElementById('camera-back-btn').onclick = () => {
            isRecording = false;
            clearInterval(timerInterval);
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); 
            stopCamera();
            cameraScreen.style.display = 'none';
            homeScreen.style.display = 'flex';
        };

        document.getElementById('month-back-btn').onclick = () => {
            homeScreen.style.display = 'none';
            monthScreen.style.display = 'flex';
            activeMonthIndex = selectedMonth - 1;
            updateMonthCards();
        };

        initMonthScreen();

    </script>
</body>
</html>
