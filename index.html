<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1 Year in 2 Hours</title>
    <style>
        /* 全体のテーマ：昔の映画館 */
        body {
            font-family: 'Times New Roman', serif;
            background-color: #111;
            color: #f4ebd0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            overscroll-behavior-y: none;
        }

        #app {
            width: 100%;
            max-width: 400px;
            height: 100dvh;
            position: relative;
            background-color: #1a1a1a;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .back-btn {
            background: none;
            border: none;
            color: #f4ebd0;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            padding: 0;
            letter-spacing: 1px;
            width: 60px;
            text-align: left;
        }
        .header-spacer { width: 60px; }

        /* --- 1. 月選択画面 --- */
        #month-screen {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .month-screen-header {
            text-align: center;
            padding: 30px 0 10px 0;
            font-size: 18px;
            letter-spacing: 4px;
            z-index: 20;
        }

        #month-list {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .month-card {
            position: absolute;
            left: 0; right: 0; top: 0; bottom: 0;
            margin: auto;
            width: 85%;
            height: auto;
            aspect-ratio: 16 / 9;
            background-color: #222;
            border: 2px solid #444;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            cursor: pointer;
            opacity: 0;
            transform: translateY(0);
            pointer-events: none;
            z-index: 0;
        }

        .month-card.active { transform: translateY(0); opacity: 1; z-index: 10; border-color: #f4ebd0; pointer-events: auto; filter: blur(0px) brightness(1); }
        .month-card.prev { transform: translateY(-60%); opacity: 0.85; z-index: 5; pointer-events: auto; filter: blur(1px) brightness(0.75); }
        .month-card.next { transform: translateY(60%); opacity: 0.85; z-index: 5; pointer-events: auto; filter: blur(1px) brightness(0.75); }
        .month-card.hidden-prev { transform: translateY(-120%); opacity: 0; }
        .month-card.hidden-next { transform: translateY(120%); opacity: 0; }

        .month-name { font-size: 32px; letter-spacing: 3px; z-index: 2; text-shadow: 2px 2px 5px rgba(0,0,0,0.9); }
        .month-card.has-data::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, #4a3f35, #2a221d); opacity: 0.7; z-index: 1;
        }

        #reset-db-btn {
            position: absolute;
            bottom: 20px;
            left: 0; right: 0;
            margin: auto;
            width: 140px;
            background: none;
            border: 1px solid #444;
            color: #888;
            padding: 8px;
            font-family: inherit;
            font-size: 10px;
            letter-spacing: 2px;
            cursor: pointer;
            z-index: 30;
            border-radius: 20px;
            transition: 0.3s;
        }
        #reset-db-btn:hover { background-color: #b22222; color: #fff; border-color: #b22222; }

        /* --- 2. ホーム画面 --- */
        #home-screen { display: none; flex-direction: column; height: 100dvh; }
        .home-header { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid #333; }
        h2.screen-title { margin: 0; flex-grow: 1; text-align: center; font-size: 20px; letter-spacing: 2px; font-weight: normal; }

        #calendar-container { padding: 20px; overflow-y: auto; flex-grow: 1; overscroll-behavior-y: auto; }
        .weekday-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 10px; text-align: center; font-size: 12px; color: #666; }
        #calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 30px; }

        .day-box {
            aspect-ratio: 1; background-color: #2a2a2a; border: 1px solid #444; display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: #888; cursor: pointer; position: relative; overflow: hidden; transition: all 0.3s; box-sizing: border-box; -webkit-tap-highlight-color: transparent;
        }
        .day-box.out-of-month { opacity: 0.4; background-color: #151515; border-color: #222; }
        .day-box.today { border: 2px solid #b22222; color: #f4ebd0; box-shadow: inset 0 0 15px rgba(178, 34, 34, 0.2); opacity: 1; }
        .day-box.recorded { background-color: #4a3f35; color: #f4ebd0; border-color: #665; opacity: 1; }
        .day-box.recorded::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.5); }
        .day-box span { position: relative; z-index: 1; }

        #tickets-area { display: flex; flex-direction: column; gap: 15px; padding-bottom: 30px; }
        
        .ticket {
            background-color: #f4ebd0; color: #111; border: 2px dashed #111; border-radius: 8px; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: transform 0.2s, background-color 0.2s; position: relative; -webkit-tap-highlight-color: transparent;
        }
        .ticket::before, .ticket::after { content: ''; position: absolute; top: 50%; width: 16px; height: 16px; background-color: #1a1a1a; border-radius: 50%; transform: translateY(-50%); }
        .ticket::before { left: -8px; } .ticket::after { right: -8px; }
        .ticket:hover { transform: translateY(-2px); background-color: #e8debf; }
        
        /* ★追加：ロック中のチケットのデザイン */
        .ticket.locked {
            background-color: #2a2a2a;
            color: #666;
            border-color: #444;
            cursor: not-allowed;
        }
        .ticket.locked:hover {
            transform: none;
            background-color: #2a2a2a;
        }
        .ticket.locked .ticket-dates {
            color: #555;
        }

        .ticket-info { display: flex; flex-direction: column; }
        .ticket-week { font-size: 16px; font-weight: bold; letter-spacing: 2px; }
        .ticket-dates { font-size: 11px; color: #444; margin-top: 4px; }
        .ticket-play { font-size: 18px; display: flex; align-items: center; gap: 8px; }
        
        /* ロック中アイコンの微調整 */
        .ticket.locked .ticket-play { font-size: 14px; }

        .record-badge { font-size: 10px; background: #b22222; color: #fff; padding: 2px 6px; border-radius: 10px; font-weight: bold; }

        /* --- 3. 撮影画面 --- */
        #camera-screen { display: none; flex-direction: column; height: 100dvh; background-color: #000; }
        .camera-header { padding: 20px; display: flex; align-items: center; border-bottom: 1px solid #222; }
        #camera-date-display { flex-grow: 1; text-align: center; font-size: 16px; letter-spacing: 2px; color: #888; }
        
        .video-container { width: 100%; aspect-ratio: 16 / 9; background-color: #222; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-top: 20px; }
        #camera-view { width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #record-timer { position: absolute; top: 10px; right: 15px; color: #b22222; font-family: monospace; font-size: 14px; letter-spacing: 2px; z-index: 10; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px; }
        #progress-container { width: 100%; height: 6px; background-color: #111; position: absolute; bottom: 0; left: 0; z-index: 10; }
        #progress-bar { height: 100%; width: 0%; background-color: #b22222; transition: width 0.1s linear; box-shadow: 0 0 10px rgba(178, 34, 34, 0.8); }

        .controls { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #record-btn { width: 70px; height: 70px; border-radius: 50%; background-color: #b22222; border: 4px solid #f4ebd0; cursor: pointer; outline: none; transition: transform 0.2s; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        #record-btn.recording { border-radius: 10px; transform: scale(0.9); }
        #record-btn:disabled { background-color: #555; border-color: #777; cursor: not-allowed; }
        .mock-text { position: absolute; color: #555; font-size: 12px; letter-spacing: 1px; z-index: 0; }

        /* --- 4. CUT画面 --- */
        #finish-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; background-color: #0a0a0a; position: absolute; top: 0; left: 0; width: 100%; z-index: 100; }
        .finish-title { font-size: 32px; letter-spacing: 8px; color: #f4ebd0; margin-bottom: 20px; font-style: italic; }
        .finish-desc { font-size: 12px; color: #888; letter-spacing: 2px; margin-bottom: 50px; text-align: center; }
        .finish-btn { background-color: transparent; border: 1px solid #b22222; color: #b22222; padding: 15px 40px; font-family: inherit; font-size: 14px; letter-spacing: 3px; cursor: pointer; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .finish-btn:hover { background-color: #b22222; color: #111; }

        /* --- 5. 再生画面 --- */
        #playback-screen { display: none; flex-direction: column; height: 100dvh; background-color: #000; }
        #playback-date-display { flex-grow: 1; text-align: center; font-size: 16px; letter-spacing: 2px; color: #888; }
        #playback-view { width: 100%; height: 100%; object-fit: cover; }

        #record-canvas { position: absolute; top: -9999px; left: -9999px; opacity: 0; pointer-events: none; }

    </style>
</head>
<body>

    <div id="app">
        <div id="month-screen">
            <div class="month-screen-header">YEAR <span id="current-year-display"></span></div>
            <div id="month-list"></div>
            <button id="reset-db-btn">RESET ALL DATA</button>
        </div>

        <div id="home-screen">
            <header class="home-header">
                <button class="back-btn" id="month-back-btn">&lt; BACK</button>
                <h2 class="screen-title" id="month-title">June</h2>
                <div class="header-spacer"></div>
            </header>
            <div id="calendar-container">
                <div class="weekday-header">
                    <span>SUN</span><span>MON</span><span>TUE</span><span>WED</span><span>THU</span><span>FRI</span><span>SAT</span>
                </div>
                <div id="calendar"></div>
                <div id="tickets-area"></div>
            </div>
        </div>

        <div id="camera-screen">
            <header class="camera-header">
                <button class="back-btn" id="camera-back-btn">&lt; BACK</button>
                <div id="camera-date-display">REC</div>
                <div class="header-spacer"></div>
            </header>
            <div class="video-container">
                <video id="camera-view" autoplay muted playsinline></video>
                <div class="mock-text">CAMERA SETUP...</div>
                <div id="record-timer">00:00 / 00:20</div>
                <div id="progress-container"><div id="progress-bar"></div></div>
            </div>
            <div class="controls"><button id="record-btn"></button></div>
        </div>

        <div id="finish-screen">
            <div class="finish-title">CUT.</div>
            <div class="finish-desc">今日の記録をフィルムに焼き付けました</div>
            <button class="finish-btn" id="finish-ok-btn">RETURN</button>
        </div>

        <div id="playback-screen">
            <header class="camera-header">
                <button class="back-btn" id="playback-back-btn">&lt; BACK</button>
                <div id="playback-date-display">PLAY</div>
                <div class="header-spacer"></div>
            </header>
            <div class="video-container">
                <video id="playback-view" playsinline webkit-playsinline></video>
            </div>
        </div>

        <canvas id="record-canvas"></canvas>
    </div>

    <script>
        /* =========================================
           1. データベース（IndexedDB）の構築と操作
        ========================================= */
        const dbName = 'OneYearInTwoHoursDB_v3';
        const storeName = 'videos';
        let db;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, 1);
                
                request.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains(storeName)) {
                        db.createObjectStore(storeName); 
                    }
                };
                
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve();
                };
                
                request.onerror = (e) => reject(request.error);
            });
        }

        function saveVideoToDB(dateKey, blob) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                store.put(blob, dateKey);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        function getVideoFromDB(dateKey) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const request = store.get(dateKey);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function getAllRecordedKeys() {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(storeName, 'readonly');
                const store = tx.objectStore(storeName);
                const request = store.getAllKeys();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        document.getElementById('reset-db-btn').onclick = () => {
            if(confirm("すべての録画データを消去してリセットしますか？\n（テスト中にやり直したい場合に使用します）")) {
                const req = indexedDB.deleteDatabase(dbName);
                req.onsuccess = () => {
                    alert("データをリセットしました。アプリを再読み込みします。");
                    location.reload();
                };
                req.onerror = () => alert("リセットに失敗しました。");
            }
        };

        /* =========================================
           2. アプリのUIとロジック
        ========================================= */
        const monthScreen = document.getElementById('month-screen');
        const monthList = document.getElementById('month-list');
        const homeScreen = document.getElementById('home-screen');
        const cameraScreen = document.getElementById('camera-screen');
        const finishScreen = document.getElementById('finish-screen');
        const playbackScreen = document.getElementById('playback-screen');
        
        const calendarElement = document.getElementById('calendar');
        const ticketsArea = document.getElementById('tickets-area');
        const monthTitle = document.getElementById('month-title');
        
        const cameraDateDisplay = document.getElementById('camera-date-display');
        const playbackDateDisplay = document.getElementById('playback-date-display');
        const cameraView = document.getElementById('camera-view');
        const playbackView = document.getElementById('playback-view');
        
        const recordBtn = document.getElementById('record-btn');
        const progressBar = document.getElementById('progress-bar');
        const recordTimer = document.getElementById('record-timer');

        // 現実の今日の日付
        const todayDateObj = new Date();
        const currentYearReal = todayDateObj.getFullYear();
        const currentMonthNumReal = todayDateObj.getMonth() + 1;
        const currentDateReal = todayDateObj.getDate();
        
        // 時刻を0:00にリセットした今日のDateオブジェクト（比較用）
        const todayResetObj = new Date(currentYearReal, currentMonthNumReal - 1, currentDateReal);

        const viewYear = currentYearReal;
        document.getElementById('current-year-display').textContent = viewYear;
        
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        let activeMonthIndex = currentMonthNumReal - 1; 
        let cards = [];
        
        let recordTargetYear = null;
        let recordTargetMonth = null;
        let recordTargetDay = null;
        let selectedMonth = currentMonthNumReal;
        
        let recordedData = {};

        async function startApp() {
            try {
                await initDB();
                const keys = await getAllRecordedKeys();
                keys.forEach(key => { recordedData[key] = true; });
                initMonthScreen();
            } catch (err) {
                console.error("DB初期化エラー", err);
                alert("データの読み込みに失敗しました。");
                initMonthScreen();
            }
        }

        function initMonthScreen() {
            monthList.innerHTML = '';
            cards = [];
            for (let i = 0; i < 12; i++) {
                const card = document.createElement('div');
                card.className = 'month-card';
                const hasDataInMonth = Object.keys(recordedData).some(key => key.startsWith(`${viewYear}-${i + 1}-`));
                if (hasDataInMonth) card.classList.add('has-data');
                const nameSpan = document.createElement('div');
                nameSpan.className = 'month-name';
                nameSpan.textContent = monthNames[i];
                card.appendChild(nameSpan);

                card.onclick = () => {
                    if (i === activeMonthIndex) { openMonth(i + 1); } 
                    else if (i === activeMonthIndex - 1 || i === activeMonthIndex + 1) {
                        activeMonthIndex = i; updateMonthCards();
                    }
                };
                monthList.appendChild(card);
                cards.push(card);
            }
            updateMonthCards();
        }

        function updateMonthCards() {
            cards.forEach((card, index) => {
                card.className = 'month-card'; 
                const hasDataInMonth = Object.keys(recordedData).some(key => key.startsWith(`${viewYear}-${index + 1}-`));
                if (hasDataInMonth) card.classList.add('has-data');

                if (index === activeMonthIndex) card.classList.add('active');
                else if (index === activeMonthIndex - 1) card.classList.add('prev');
                else if (index === activeMonthIndex + 1) card.classList.add('next');
                else if (index < activeMonthIndex - 1) card.classList.add('hidden-prev');
                else if (index > activeMonthIndex + 1) card.classList.add('hidden-next');
            });
        }

        let isScrolling = false;
        let startY = 0;
        monthScreen.addEventListener('wheel', (e) => {
            if (isScrolling) return;
            if (e.deltaY > 20 && activeMonthIndex < 11) { activeMonthIndex++; updateMonthCards(); lockScroll(); }
            else if (e.deltaY < -20 && activeMonthIndex > 0) { activeMonthIndex--; updateMonthCards(); lockScroll(); }
        });
        monthScreen.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
        monthScreen.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; });
        monthScreen.addEventListener('touchend', (e) => {
            const endY = e.changedTouches[0].clientY;
            const delta = startY - endY;
            if (delta > 30 && activeMonthIndex < 11) { activeMonthIndex++; updateMonthCards(); }
            else if (delta < -30 && activeMonthIndex > 0) { activeMonthIndex--; updateMonthCards(); }
        });

        function lockScroll() { isScrolling = true; setTimeout(() => { isScrolling = false; }, 400); }

        function openMonth(month) {
            selectedMonth = month;
            monthTitle.textContent = monthNames[month - 1];
            monthScreen.style.display = 'none';
            homeScreen.style.display = 'flex';
            renderCalendarAndTickets();
        }

        function renderCalendarAndTickets() {
            calendarElement.innerHTML = '';
            ticketsArea.innerHTML = '';

            const firstDayOfMonth = new Date(viewYear, selectedMonth - 1, 1);
            const lastDayOfMonth = new Date(viewYear, selectedMonth, 0);
            const startDate = new Date(firstDayOfMonth);
            startDate.setDate(startDate.getDate() - startDate.getDay());
            const endDate = new Date(lastDayOfMonth);
            endDate.setDate(endDate.getDate() + (6 - endDate.getDay()));

            let currentDate = new Date(startDate);
            let weekDatesArray = [];
            let weekNum = 1;

            while (currentDate <= endDate) {
                const boxYear = currentDate.getFullYear();
                const boxMonth = currentDate.getMonth() + 1;
                const boxDate = currentDate.getDate();
                const dataKey = `${boxYear}-${boxMonth}-${boxDate}`;

                const dayBox = document.createElement('div');
                dayBox.className = 'day-box';
                
                if (boxMonth !== selectedMonth) dayBox.classList.add('out-of-month');

                const isToday = (boxYear === currentYearReal && boxMonth === currentMonthNumReal && boxDate === currentDateReal);
                if (isToday) dayBox.classList.add('today');
                if (recordedData[dataKey]) dayBox.classList.add('recorded');

                const dayText = document.createElement('span');
                dayText.textContent = boxDate;
                dayBox.appendChild(dayText);
                
                dayBox.onclick = () => {
                    if (recordedData[dataKey]) {
                        startPlayback([dataKey]); 
                        return;
                    }
                    if (isToday) {
                        openCameraScreen(boxYear, boxMonth, boxDate);
                    } else {
                        if (currentDate > todayResetObj) alert('まだその日は来ていません。未来の記録を楽しみにお待ちください。');
                        else alert('過去の日は撮影できません。日々の記録は当日のみ可能です。');
                    }
                };
                
                calendarElement.appendChild(dayBox);
                weekDatesArray.push(new Date(currentDate));

                if (currentDate.getDay() === 6) {
                    createTicket(weekNum, weekDatesArray);
                    weekNum++;
                    weekDatesArray = []; 
                }
                currentDate.setDate(currentDate.getDate() + 1);
            }
        }

        function createTicket(weekNum, datesInWeek) {
            const startDay = datesInWeek[0];
            const endDay = datesInWeek[6]; // この週の土曜日
            const startM = monthNames[startDay.getMonth()].substring(0, 3);
            const endM = monthNames[endDay.getMonth()].substring(0, 3);
            
            let dateLabel = (startDay.getMonth() === endDay.getMonth()) ? 
                `${startM} ${startDay.getDate()} - ${endDay.getDate()}` : 
                `${startM} ${startDay.getDate()} - ${endM} ${endDay.getDate()}`;

            let validKeys = [];
            datesInWeek.forEach(d => {
                const key = `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
                if (recordedData[key]) validKeys.push(key);
            });
            const recordedCount = validKeys.length;

            // ★週が「完了」しているかどうかの判定（ロック機能）
            const lastDateKey = `${endDay.getFullYear()}-${endDay.getMonth() + 1}-${endDay.getDate()}`;
            const isLastDayRecorded = !!recordedData[lastDateKey]; // その週の土曜日を撮り終えたか
            const isWeekOver = todayResetObj > endDay; // すでに次の週以降になっているか（現在の日付が土曜日を過ぎているか）

            const isViewable = isLastDayRecorded || isWeekOver;

            const ticket = document.createElement('div');
            ticket.className = 'ticket';
            
            // 閲覧可能でない場合はロックデザインを適用
            if (!isViewable) {
                ticket.classList.add('locked');
            }

            ticket.innerHTML = `
                <div class="ticket-info">
                    <div class="ticket-week">WEEK ${weekNum}</div>
                    <div class="ticket-dates">${dateLabel}</div>
                </div>
                <div class="ticket-play">
                    ${recordedCount > 0 && isViewable ? `<span class="record-badge">${recordedCount} REC</span>` : ''}
                    ${isViewable ? '▶' : '🔒'}
                </div>
            `;
            
            ticket.onclick = () => {
                if (!isViewable) {
                    alert('この週の振り返りは、週末の記録を終えるか、次の週になるまでのお楽しみです。');
                    return;
                }

                if (recordedCount === 0) {
                    alert('この週には記録がありません。');
                } else {
                    startPlayback(validKeys);
                }
            };
            ticketsArea.appendChild(ticket);
        }

        /* === 録画とDB保存 === */
        let isRecording = false;
        let totalRecordTime = 0;
        let timerInterval;
        let mediaRecorder;
        let recordedChunks = [];
        const MAX_RECORD_TIME = 20000;
        
        const recordCanvas = document.getElementById('record-canvas');
        recordCanvas.width = 1280;
        recordCanvas.height = 720;
        const recordCanvasCtx = recordCanvas.getContext('2d');
        let drawFrameId;

        function openCameraScreen(y, m, d) {
            recordTargetYear = y; recordTargetMonth = m; recordTargetDay = d;
            cameraDateDisplay.textContent = `${monthNames[m-1].substring(0,3)} ${d} - REC`;
            homeScreen.style.display = 'none';
            cameraScreen.style.display = 'flex';
            totalRecordTime = 0; recordedChunks = []; progressBar.style.width = '0%';
            recordTimer.textContent = '00:00 / 00:20';
            recordBtn.disabled = false; recordBtn.classList.remove('recording');
            startCamera();
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: true 
                });
                cameraView.srcObject = stream;

                cameraView.onplaying = () => {
                    if(drawFrameId) cancelAnimationFrame(drawFrameId);
                    drawToCanvas();
                };

                const canvasStream = recordCanvas.captureStream(30);
                const audioTracks = stream.getAudioTracks();
                if (audioTracks.length > 0) {
                    canvasStream.addTrack(audioTracks[0]);
                }

                mediaRecorder = new MediaRecorder(canvasStream);
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) recordedChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const mimeType = mediaRecorder.mimeType || (recordedChunks[0] && recordedChunks[0].type) || '';
                    const blob = new Blob(recordedChunks, { type: mimeType }); 
                    
                    const dataKey = `${recordTargetYear}-${recordTargetMonth}-${recordTargetDay}`;
                    
                    try {
                        await saveVideoToDB(dataKey, blob);
                        recordedData[dataKey] = true; 
                    } catch(e) {
                        console.error("保存失敗", e);
                        alert("動画の保存に失敗しました。");
                    }
                    
                    stopCamera();
                    cameraScreen.style.display = 'none';
                    finishScreen.style.display = 'flex';
                };
            } catch (err) {
                console.log("カメラ起動エラー:", err);
                alert("カメラまたはマイクの起動に失敗しました。\nブラウザのアクセス許可をご確認ください。");
            }
        }

        function drawToCanvas() {
            if (!cameraView.srcObject) return;
            const vw = cameraView.videoWidth;
            const vh = cameraView.videoHeight;
            
            if (vw > 0 && vh > 0) {
                let sWidth = vw;
                let sHeight = vw * (9 / 16);
                let sx = 0;
                let sy = (vh - sHeight) / 2;

                if (vw / vh > 16 / 9) {
                    sHeight = vh;
                    sWidth = vh * (16 / 9);
                    sx = (vw - sWidth) / 2;
                    sy = 0;
                }
                
                recordCanvasCtx.drawImage(cameraView, sx, sy, sWidth, sHeight, 0, 0, recordCanvas.width, recordCanvas.height);
            }
            drawFrameId = requestAnimationFrame(drawToCanvas);
        }

        function stopCamera() { 
            if (cameraView.srcObject) cameraView.srcObject.getTracks().forEach(t => t.stop()); 
            if (drawFrameId) cancelAnimationFrame(drawFrameId);
        }

        recordBtn.onclick = function() {
            if (!mediaRecorder) return;
            if (isRecording) {
                isRecording = false; recordBtn.classList.remove('recording'); clearInterval(timerInterval);
                if (mediaRecorder.state === 'recording') mediaRecorder.pause(); 
            } else {
                isRecording = true; recordBtn.classList.add('recording');
                if (mediaRecorder.state === 'inactive') mediaRecorder.start(200); 
                else if (mediaRecorder.state === 'paused') mediaRecorder.resume(); 

                timerInterval = setInterval(() => {
                    totalRecordTime += 100;
                    progressBar.style.width = (totalRecordTime / MAX_RECORD_TIME) * 100 + '%';
                    const currentSec = Math.floor(totalRecordTime / 1000);
                    recordTimer.textContent = `00:${currentSec.toString().padStart(2, '0')} / 00:20`;
                    if (totalRecordTime >= MAX_RECORD_TIME) finishRecording();
                }, 100);
            }
        };

        function finishRecording() {
            isRecording = false; recordBtn.classList.remove('recording'); clearInterval(timerInterval); recordBtn.disabled = true;
            if (mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        }

        document.getElementById('finish-ok-btn').onclick = () => {
            finishScreen.style.display = 'none'; homeScreen.style.display = 'flex';
            renderCalendarAndTickets(); initMonthScreen();
        };

        /* === 再生画面（プレイリスト連続再生機能） === */
        let playlistUrls = [];
        let currentPlayIndex = 0;

        async function startPlayback(keys) {
            playlistUrls = [];
            for (let key of keys) {
                try {
                    const blob = await getVideoFromDB(key);
                    if (blob) {
                        playlistUrls.push({ key: key, url: URL.createObjectURL(blob) });
                    }
                } catch(e) {
                    console.error("読み込みエラー", e);
                }
            }

            if (playlistUrls.length === 0) {
                alert("再生できる動画が見つかりませんでした。");
                return;
            }

            homeScreen.style.display = 'none';
            playbackScreen.style.display = 'flex';
            currentPlayIndex = 0;
            playNextInPlaylist();
        }

        function playNextInPlaylist() {
            if (currentPlayIndex >= playlistUrls.length) {
                closePlaybackScreen();
                return;
            }

            const currentItem = playlistUrls[currentPlayIndex];
            
            if (playlistUrls.length > 1) {
                playbackDateDisplay.textContent = `WEEKLY MOVIE - ${currentPlayIndex + 1}/${playlistUrls.length}`;
            } else {
                const parts = currentItem.key.split('-');
                playbackDateDisplay.textContent = `${monthNames[parseInt(parts[1])-1].substring(0,3)} ${parts[2]} - PLAY`;
            }

            playbackView.src = currentItem.url;
            playbackView.play().catch(e => console.log("自動再生ブロック:", e));

            playbackView.onended = () => {
                currentPlayIndex++;
                playNextInPlaylist();
            };
        }

        function closePlaybackScreen() {
            playbackView.pause();
            playbackView.onended = null; 
            playlistUrls.forEach(item => URL.revokeObjectURL(item.url));
            playlistUrls = [];
            playbackView.src = ""; 
            playbackScreen.style.display = 'none';
            homeScreen.style.display = 'flex';
        }

        document.getElementById('playback-back-btn').onclick = closePlaybackScreen;

        /* --- ナビゲーション --- */
        document.getElementById('camera-back-btn').onclick = () => {
            isRecording = false; clearInterval(timerInterval);
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); 
            stopCamera(); cameraScreen.style.display = 'none'; homeScreen.style.display = 'flex';
        };

        document.getElementById('month-back-btn').onclick = () => {
            homeScreen.style.display = 'none'; monthScreen.style.display = 'flex';
            activeMonthIndex = selectedMonth - 1; updateMonthCards();
        };

        startApp();

    </script>
</body>
